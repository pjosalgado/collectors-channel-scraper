image: python:3.12.7-slim

stages:
  - test
  - deploy

include:
  - template: Security/SAST.gitlab-ci.yml

sast:
  stage: test

zyte:
  stage: deploy
  script:
    - pip install -r requirements.txt
    - sed -i "s/\$SHUB_API_KEY/$SHUB_API_KEY/g" scrapinghub.yml
    - shub deploy
  only:
    - master
  environment:
    name: zyte
    url: $ENV_URL

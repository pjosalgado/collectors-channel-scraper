image: python:3.12.7-slim

stages:
  - test
  - build
  - deploy

include:
  - template: Security/SAST.gitlab-ci.yml

sast:
  stage: test

docker-hub:
  stage: build
  only:
    - master
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    IMAGE_NAME: paulosalgado/collectors-channel-scraper
  before_script:
    - echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
    - docker buildx create --driver docker-container --use
    - VERSION=$(grep '^version =' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
  script:
    - sed -i "s|\$VERSION|$VERSION|g" setup.py
    - sed -i "s|\$VERSION|$VERSION|g" Dockerfile
    - |
      docker buildx build \
        --platform=linux/amd64,linux/arm64 \
        --push \
        -t ${IMAGE_NAME}:${VERSION} \
        -t ${IMAGE_NAME}:latest \
        .

zyte:
  stage: deploy
  only:
    - master
  image: python:3.12.7-slim
  before_script:
    - VERSION=$(grep '^version =' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
    - sed -i "s|\$VERSION|$VERSION|g" setup.py
    - python3 -m pip install --upgrade pip
    - python3 -m pip install poetry poetry-plugin-export
    - poetry config virtualenvs.create false
    - poetry install --no-root --only main
    - poetry export --only main -f requirements.txt --output requirements.txt --without-hashes
  script:
    - sed -i "s/\$ZYTE_API_KEY/$ZYTE_API_KEY/g" scrapinghub.yml
    - poetry run shub deploy
  environment:
    name: zyte
    url: $ENV_URL
  cache:
    paths:
      - .cache/pypoetry
      - .venv
